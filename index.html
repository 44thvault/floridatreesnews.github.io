<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLORIDA TREES NEWS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <!-- Prefetch news from our own API immediately -->
    <script>
        const newsFetchPromise = fetch('/api/news').then(r => r.json());
    </script>

    <style>
        body {
            font-family: 'Courier Prime', monospace;
            background: #ffffff;
            color: #000000;
            margin: 0;
        }

        .top-banner {
            text-align: center;
            padding: 25px;
            border-bottom: 4px solid #000;
        }

        .logo {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .tagline {
            font-size: 15px;
            font-style: italic;
        }

        .last-update {
            text-align: center;
            padding: 12px;
            background: #f5f5f5;
            font-size: 13px;
            border-bottom: 1px solid #000;
        }

        #news-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .news-item {
            border-bottom: 1px solid #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .news-item a {
            text-decoration: none;
            color: #000;
            font-weight: 700;
            font-size: 16px;
        }

        .news-item a:hover {
            color: #333;
        }

        .meta {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .retry-btn {
            font-family: 'Courier Prime', monospace;
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
        }

        .retry-btn:hover {
            background: #333;
        }

        .footer {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 30px 20px;
            font-size: 12px;
        }

        .project-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 20px;
            background: #000;
            border-top: 1px solid #333;
        }

        .project-links a {
            display: inline-block;
            opacity: 0.85;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .project-links a:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        .project-links img {
            width: 65px;
            height: 65px;
            display: block;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>

<div class="top-banner">
    <div class="logo">FLORIDA TREES NEWS</div>
    <div class="tagline">Your source for cannabis news in the Sunshine State</div>
</div>

<div class="last-update">
    Last Updated: <span id="updateTime"></span>
</div>

<div id="news-container">
    <div class="news-item">
        <a>Loading news&hellip;</a>
        <div class="meta">Please wait</div>
    </div>
</div>

<div class="footer">
    This site aggregates public news. All rights belong to their respective owners.
</div>

<div class="project-links">
    <a href="https://www.playdecadence.online" target="_blank" rel="noopener noreferrer">
        <img src="decadence.png" alt="Decadence - Play Now" title="Play Decadence">
    </a>
    <a href="https://archetypal-tarot.vercel.app/" target="_blank" rel="noopener noreferrer">
        <img src="tarot.png" alt="Archetypal Tarot" title="Archetypal Tarot">
    </a>
</div>

<script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

<script>
function updateTime() {
    document.getElementById('updateTime').textContent =
        new Date().toLocaleString();
}
updateTime();
setInterval(updateTime, 60000);

async function fetchNews() {
    try {
        // Try our own serverless API first (prefetched in <head>)
        const data = await newsFetchPromise;

        if (data.ok && data.items && data.items.length > 0) {
            renderNews(data.items);
            return;
        }
    } catch (e) {
        console.warn('API route failed, trying fallback:', e);
    }

    // Fallback: rss2json client-side
    try {
        const rss = encodeURIComponent(
            'https://news.google.com/rss/search?q=florida+marijuana+cannabis&hl=en-US&gl=US&ceid=US:en'
        );
        const res = await fetch(
            `https://api.rss2json.com/v1/api.json?rss_url=${rss}`
        );
        const data = await res.json();
        if (data.status === 'ok' && data.items?.length) {
            renderNews(data.items.slice(0, 15).map(i => ({
                title: i.title,
                link: i.link,
                source: i.author || '',
                pubDate: i.pubDate
            })));
            return;
        }
    } catch (e2) {
        console.warn('Fallback also failed:', e2);
    }

    showError('News temporarily unavailable.');
}

function renderNews(items) {
    const container = document.getElementById('news-container');
    container.innerHTML = items.map(item => {
        const safeTitle = escapeHtml(item.title);
        const safeSource = escapeHtml(item.source || item.author || 'News');
        const safeLink = escapeHtml(item.link);
        const dateStr = item.pubDate
            ? new Date(item.pubDate).toLocaleDateString()
            : '';
        return `
            <div class="news-item">
                <a href="${safeLink}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
                <div class="meta">
                    ${safeSource}${dateStr ? ' &bull; ' + dateStr : ''}
                </div>
            </div>
        `;
    }).join('');
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function showError(msg) {
    document.getElementById('news-container').innerHTML = `
        <div class="news-item" style="text-align:center;">
            <a style="color:red">${msg}</a>
            <br>
            <button class="retry-btn" onclick="location.reload()">Retry</button>
        </div>
    `;
}

fetchNews();
</script>

</body>
</html>
